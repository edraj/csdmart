name: Check

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  check:
    runs-on: [self-hosted]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: yarn install

      - name: Build (generates .routify/ needed by svelte-check)
        run: yarn build

      - name: Type-check (svelte-check)
        run: yarn run check
