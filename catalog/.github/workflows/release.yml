name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: [self-hosted]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: yarn install

      - name: Build
        run: yarn build

      - name: Create tarball
        run: tar -czf "catalog-${{ github.event.release.tag_name }}.tar.gz" -C dist .

      - name: Attach tarball to release
        uses: softprops/action-gh-release@v3
        with:
          files: catalog-${{ github.event.release.tag_name }}.tar.gz
